name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build
        run: dotnet build HeroWorkhorse.slnx
      - name: Test
        run: dotnet test tests/HeroWorkhorse.Tests/HeroWorkhorse.Tests.csproj --no-build

  angular:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: samples/sql-agent/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: samples/sql-agent/ui/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
